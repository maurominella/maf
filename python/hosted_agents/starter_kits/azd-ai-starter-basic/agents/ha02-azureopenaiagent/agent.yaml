name: ha02-azureopenaiagent

# Brief description of what this agent does
description: >
  A travel assistant agent that helps users find hotels in Seattle.
  Demonstrates local Python tool execution - a key advantage of code-based 
  hosted agents over prompt agents.

metadata:
  authors:
    - Microsoft
    - Mauro Minella
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Local Tools
    - Travel Assistant
    - Hotel Search

template:
  name: ha02-azureopenaiagent
  kind: hosted
  protocols:
    - protocol: responses
      version: v1
  environment_variables:
    # https://<foundry_account>.services.ai.azure.com/api/projects/<foundry_project>, gpt-4o
    - name: AIF_STD_PROJECT_ENDPOINT    
      value: ${AIF_STD_PROJECT_ENDPOINT}
    - name: MODEL_DEPLOYMENT_NAME
      value: ${MODEL_DEPLOYMENT_NAME}
